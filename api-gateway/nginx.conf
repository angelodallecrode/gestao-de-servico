# API Gateway - ponto de entrada unico do ambiente.
# Roteia o trafego externo e a comunicacao entre os servicos.

server {
    listen 80;
    server_name _;

    # Cabecalhos de proxy padrao.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ServicoGestao: clientes, planos e assinaturas.
    location /gestao/ {
        proxy_pass http://servico-gestao:3000;
    }

    # ServicoFaturamento: registro de pagamentos.
    location /registrarpagamento {
        proxy_pass http://servico-faturamento:3001;
    }

    # ServicoPlanosAtivos: consulta de planos ativos.
    location /planosativos/ {
        proxy_pass http://servico-planos-ativos:3002;
    }
}
